<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>駐輪場のおっちゃん</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #101018;
      color: #f8f8f8;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      user-select: none;
    }
    .wrap { text-align: center; }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: 640px;
      height: 480px;
      max-width: 96vw;
      max-height: 72vw;
      border: 6px solid #e8e8e8;
      background: #202838;
      box-shadow: 0 0 0 6px #303040, 0 14px 30px rgba(0,0,0,.45);
    }
    .help { margin-top: 12px; color: #d8d8d8; line-height: 1.7; font-size: 14px; }
    .title { font-size: 20px; margin-bottom: 10px; color: #ffe066; }

    .touch-pad {
      display: none;
      width: 96vw;
      max-width: 768px;
      margin: 10px auto 0;
      grid-template-columns: 130px 1fr 150px;
      gap: 10px;
      align-items: center;
    }
    .dpad {
      display: grid;
      grid-template-columns: 42px 42px 42px;
      grid-template-rows: 42px 42px 42px;
      gap: 2px;
    }
    .touch-btn {
      border: 3px solid #e8e8e8;
      background: #303040;
      color: #fff;
      font-family: monospace;
      font-weight: bold;
      font-size: 16px;
      border-radius: 8px;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    .touch-btn:active, .touch-btn.on { background: #606080; }
    .up { grid-column: 2; grid-row: 1; }
    .left { grid-column: 1; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }
    .down { grid-column: 2; grid-row: 3; }
    .start-area { display: flex; justify-content: center; }
    .start-btn { width: 96px; height: 38px; font-size: 13px; }
    .ab { display: flex; justify-content: flex-end; gap: 12px; }
    .ab .touch-btn { width: 58px; height: 58px; border-radius: 50%; }
    .rotate-note { display: none; color: #ffe066; margin-top: 8px; font-size: 13px; }

    @media (hover: none) and (pointer: coarse) and (orientation: landscape) {
      body { align-items: center; padding: 0; overflow: hidden; }
      .title, .help, .rotate-note { display: none; }
      .wrap {
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-columns: 150px 1fr 150px;
        grid-template-rows: 64px 1fr;
        grid-template-areas:
          "left game start"
          "left game ab";
        align-items: center;
        justify-items: center;
        column-gap: 4px;
      }
      canvas {
        grid-area: game;
        width: auto;
        height: min(96vh, calc(100vw * 0.75));
        max-width: calc(100vw - 312px);
        max-height: 96vh;
        border-width: 4px;
      }
      .touch-pad { display: contents; }
      .dpad {
        grid-area: left;
        width: 138px;
        height: 138px;
        grid-template-columns: 44px 44px 44px;
        grid-template-rows: 44px 44px 44px;
        gap: 3px;
        touch-action: none;
      }
      .start-area { grid-area: start; align-self: end; justify-self: center; }
      .start-btn { width: 100px; height: 38px; }
      .ab { grid-area: ab; align-self: start; justify-self: center; justify-content: center; gap: 14px; }
      .ab .touch-btn { width: 62px; height: 62px; }
    }

    @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
      canvas { width: 96vw; height: auto; max-height: 70vh; }
      .help { display: none; }
      .rotate-note { display: block; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">駐輪場のおっちゃん</div>
    <canvas id="game" width="320" height="240"></canvas>
    <div class="touch-pad" id="touchPad">
      <div class="dpad">
        <button class="touch-btn up" data-touch="up">▲</button>
        <button class="touch-btn left" data-touch="left">◀</button>
        <button class="touch-btn right" data-touch="right">▶</button>
        <button class="touch-btn down" data-touch="down">▼</button>
      </div>
      <div class="start-area"><button class="touch-btn start-btn" data-touch="start">START</button></div>
      <div class="ab">
        <button class="touch-btn" data-touch="b">B<br><small>走る</small></button>
        <button class="touch-btn" data-touch="a">A<br><small>決定</small></button>
      </div>
    </div>
    <div class="rotate-note">スマホでは横向きにするとタッチ操作で遊べます。</div>
    <div class="help">
      矢印キー：移動／おじさん選択　Z/A：取る・渡す・決定　X/B：ダッシュ　Enter/START：開始　P：ポーズ<br>
      スマホ横向き：左右でおじさん選択、STARTで開始。十字キー／A／Bで操作。プレイ中STARTでポーズ
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W = canvas.width, H = canvas.height;
  const keys = {};
  const SCORE_KEY = 'churinjo_occhan_high_score_v2';
  const LAST_KEY = 'churinjo_occhan_last_scores_v2';

  const BIKE_TYPES = [
    { name:'ミニベロ', short:'ミニ', weight:1, stamina:1, speedPenalty:.04, color:'#80e0ff' },
    { name:'ロードバイク', short:'ロード', weight:2, stamina:2, speedPenalty:.07, color:'#e0e0ff' },
    { name:'一般', short:'一般', weight:4, stamina:4, speedPenalty:.14, color:'#70c0ff' },
    { name:'電動', short:'電動', weight:7, stamina:7, speedPenalty:.24, color:'#ffe066' },
    { name:'大型 子供乗せ', short:'大型', weight:10, stamina:10, speedPenalty:.36, color:'#ff9090' },
  ];

  const GIFT_TYPES = [
    { id:'taiyaki', name:'タイ焼き', chance:0.34, stamina:+16, tension:0, time:0, color:'#d89040' },
    { id:'heart', name:'ハート', chance:0.25, stamina:+26, tension:+24, time:0, color:'#ff80c0' },
    { id:'clock', name:'時計', chance:0.22, stamina:0, tension:0, time:+8, color:'#80e0ff' },
    { id:'skull', name:'ドクロ', chance:0.19, stamina:-24, tension:-28, time:0, color:'#e8e8e8' },
  ];

  const OJISAN_NAMES = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const ojisans = OJISAN_NAMES.map((ch, i) => {
    const stat = k => 1 + ((i * k + k * 3) % 10);
    return {
      id: ch,
      name: 'おっちゃん' + ch,
      power: stat(3),
      speed: stat(5),
      tech: stat(7),
      kindness: stat(9),
      color: ['#808080','#907860','#609080','#806090','#909060','#608090'][i % 6],
    };
  });
  ojisans[0] = { id:'A', name:'標準おっちゃん', power:5, speed:5, tech:5, kindness:5, color:'#808080' };
  ojisans[1] = { id:'B', name:'力持ちおっちゃん', power:9, speed:3, tech:4, kindness:5, color:'#806050' };
  ojisans[2] = { id:'C', name:'俊足おっちゃん', power:3, speed:9, tech:5, kindness:4, color:'#6080a0' };
  ojisans[3] = { id:'D', name:'職人おっちゃん', power:5, speed:5, tech:9, kindness:4, color:'#607060' };
  ojisans[4] = { id:'E', name:'優しいおっちゃん', power:4, speed:4, tech:5, kindness:9, color:'#907090' };

  const bikeRows = [
    { y: 82, nums: [34,35,36,37,38,39,40,41] },
    { y: 118, nums: [42,43,44,45,46,47,48,49] },
    { y: 154, nums: [50,51,52,53,54,55,56,57] },
    { y: 190, nums: [58,59,60,61,62,63,64,65] },
  ];

  const bikes = [];
  bikeRows.forEach(row => row.nums.forEach((n, i) => {
    bikes.push({ num:n, x:34 + i * 34, y:row.y, taken:false, type:BIKE_TYPES[(n + i) % BIKE_TYPES.length] });
  }));

  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function getMoveVector() {
    let vx = 0, vy = 0;
    if (keys.ArrowLeft || pad.left || touch.left) vx--;
    if (keys.ArrowRight || pad.right || touch.right) vx++;
    if (keys.ArrowUp || pad.up || touch.up) vy--;
    if (keys.ArrowDown || pad.down || touch.down) vy++;
    return { vx, vy, moving: !!(vx || vy) };
  }
  function loadHighScore() { return Number(localStorage.getItem(SCORE_KEY) || 0); }
  function saveScore(score) {
    const high = loadHighScore();
    if (score > high) localStorage.setItem(SCORE_KEY, String(score));
    const list = JSON.parse(localStorage.getItem(LAST_KEY) || '[]');
    list.unshift({ score, date: new Date().toLocaleString('ja-JP') });
    localStorage.setItem(LAST_KEY, JSON.stringify(list.slice(0, 5)));
  }
  function loadLastScores() { try { return JSON.parse(localStorage.getItem(LAST_KEY) || '[]'); } catch { return []; } }

  let selectedOjisan = 0;

  function startState() {
    const o = ojisans[selectedOjisan];
    return {
      mode:'title', time:70, score:0, highScore:loadHighScore(), miss:0, served:0,
      stamina:100, tension:35, musou:0, message:'おじさんを選んでSTART', messageTimer:0,
      player:{ x:156, y:214, w:14, h:20, hold:null, dir:1 }, customer:null, nextCustomerTimer:0,
      ojisan:o, lastTime:performance.now(), saved:false, lastGift:null, giftTimer:0, talkTimer:0, pendingChattyBonus:null
    };
  }

  let state = startState();
  let zLock = false, enterLock = false, selectLock = false, pauseLock = false;
  let ignoreStartUntilRelease = false;
  let audioReady = false, audioCtx = null;

  function initAudio() {
    if (audioReady) return;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioReady = true; } catch(e) { audioReady = false; }
  }
  function beep(freq=440, duration=.08, type='square', volume=.16) {
    if (!audioReady || !audioCtx) return;
    const now = audioCtx.currentTime, osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(volume, now); gain.gain.exponentialRampToValueAtTime(.001, now + duration);
    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + duration);
  }
  function sound(name) {
    if (name === 'start') { beep(330,.07); setTimeout(()=>beep(440,.07),80); setTimeout(()=>beep(660,.11),160); }
    else if (name === 'pickup') beep(620,.06);
    else if (name === 'drop') beep(260,.06);
    else if (name === 'ok') { beep(520,.06); setTimeout(()=>beep(780,.09),70); }
    else if (name === 'miss') { beep(180,.12,'sawtooth',.18); setTimeout(()=>beep(120,.14,'sawtooth',.18),110); }
    else if (name === 'musou') { beep(700,.07); setTimeout(()=>beep(900,.07),80); setTimeout(()=>beep(1100,.16),160); }
    else if (name === 'pause') beep(420,.08);
    else if (name === 'gameover') { beep(330,.12); setTimeout(()=>beep(250,.12),130); setTimeout(()=>beep(180,.2),260); }
  }

  const MUSIC = {
    title: {
      step: .24,
      notes: [262,0,330,0,392,0,523,0,392,0,330,0,294,0,262,0]
    },
    select: {
      step: .18,
      notes: [392,440,494,0,392,440,523,0,330,392,440,0,294,330,392,0]
    },
    play: {
      step: .14,
      notes: [523,0,523,587,659,0,587,0,523,659,784,0,659,587,523,0]
    }
  };
  let musicMode = '';
  let musicIndex = 0;
  let musicTimer = 0;

  function musicBeep(freq, duration=.07, volume=.035) {
    if (!audioReady || !audioCtx || !freq) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(volume, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + duration);
  }

  function musicTick(dt) {
    const mode = state.mode === 'title' ? 'title' : state.mode === 'select' ? 'select' : state.mode === 'play' ? 'play' : '';
    if (!mode || !audioReady) { musicMode = mode; return; }
    if (mode !== musicMode) {
      musicMode = mode;
      musicIndex = 0;
      musicTimer = 0;
    }
    const track = MUSIC[mode];
    musicTimer -= dt;
    if (musicTimer <= 0) {
      const note = track.notes[musicIndex % track.notes.length];
      musicBeep(note, Math.min(.11, track.step * .7));
      if (mode === 'play' && note) musicBeep(note / 2, Math.min(.09, track.step * .6), .018);
      musicIndex++;
      musicTimer = track.step;
    }
  }

  const pad = { up:false, down:false, left:false, right:false, a:false, b:false, start:false };
  const touch = { up:false, down:false, left:false, right:false, a:false, b:false, start:false };

  function setupTouchControls() {
    const clearDpad = () => {
      touch.up = touch.down = touch.left = touch.right = false;
      document.querySelectorAll('.dpad .touch-btn').forEach(b => b.classList.remove('on'));
    };
    const updateDpad = (e, dpad) => {
      e.preventDefault(); initAudio();
      const r = dpad.getBoundingClientRect(), x = e.clientX - r.left, y = e.clientY - r.top;
      const cx = r.width / 2, cy = r.height / 2, dead = 12;
      touch.left = x < cx - dead; touch.right = x > cx + dead; touch.up = y < cy - dead; touch.down = y > cy + dead;
      document.querySelector('[data-touch="left"]').classList.toggle('on', touch.left);
      document.querySelector('[data-touch="right"]').classList.toggle('on', touch.right);
      document.querySelector('[data-touch="up"]').classList.toggle('on', touch.up);
      document.querySelector('[data-touch="down"]').classList.toggle('on', touch.down);
    };
    const dpad = document.querySelector('.dpad');
    if (dpad) {
      dpad.addEventListener('pointerdown', e => { dpad.setPointerCapture(e.pointerId); updateDpad(e, dpad); });
      dpad.addEventListener('pointermove', e => updateDpad(e, dpad));
      dpad.addEventListener('pointerup', e => { e.preventDefault(); clearDpad(); });
      dpad.addEventListener('pointercancel', e => { e.preventDefault(); clearDpad(); });
    }
    document.querySelectorAll('[data-touch="a"], [data-touch="b"], [data-touch="start"]').forEach(btn => {
      const name = btn.dataset.touch;
      const on = e => { e.preventDefault(); initAudio(); touch[name] = true; btn.classList.add('on'); };
      const off = e => { e.preventDefault(); touch[name] = false; btn.classList.remove('on'); };
      btn.addEventListener('pointerdown', on); btn.addEventListener('pointerup', off); btn.addEventListener('pointercancel', off); btn.addEventListener('pointerleave', off);
    });
  }

  function pollGamepad() {
    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    const gp = pads && Array.from(pads).find(p => p);
    if (!gp) { pad.up = pad.down = pad.left = pad.right = pad.a = pad.b = pad.start = false; return; }
    const ax0 = gp.axes[0] || 0, ax1 = gp.axes[1] || 0, pressed = i => !!(gp.buttons[i] && gp.buttons[i].pressed);
    pad.left = ax0 < -.35 || pressed(14); pad.right = ax0 > .35 || pressed(15); pad.up = ax1 < -.35 || pressed(12); pad.down = ax1 > .35 || pressed(13);
    pad.a = pressed(0); pad.b = pressed(1); pad.start = pressed(9) || pressed(7);
  }

  function resetBikes() { bikes.forEach(b => b.taken = false); }
  function randomBike() {
    const available = bikes.filter(b => !b.taken);
    return available.length ? available[Math.floor(Math.random() * available.length)] : bikes[Math.floor(Math.random() * bikes.length)];
  }
  function spawnCustomer() {
    const moods = [
      { name:'おばちゃん', mood:'normal', patience:13, bonus:80, ten:7, text:'ありがとうな' },
      { name:'会社員', mood:'bad', patience:8, bonus:120, ten:-14, text:'急いでるんやけど' },
      { name:'学生', mood:'normal', patience:11, bonus:90, ten:5, text:'あざっす' },
      { name:'常連', mood:'good', patience:16, bonus:80, ten:12, text:'まいど助かるわ' },
      { name:'話好きの常連', mood:'good', patience:18, bonus:95, ten:16, text:'ちょっと聞いてや', chatty:true },
      { name:'綺麗なお姉さん', mood:'good', patience:12, bonus:150, ten:28, text:'ありがとうございます' },
      { name:'態度悪い客', mood:'bad', patience:9, bonus:60, ten:-24, text:'はよしてや' },
    ];
    const t = moods[Math.floor(Math.random() * moods.length)], b = randomBike();
    state.customer = { x:148, y:52, want:b.num, wantType:b.type, patience:t.patience + state.ojisan.kindness * .35, maxPatience:t.patience + state.ojisan.kindness * .35, ...t };
  }
  function restart() {
    initAudio(); sound('start'); resetBikes();
    state = startState(); state.mode = 'play'; state.message = state.ojisan.name + ' 出勤！'; state.messageTimer = 1.1;
    pauseLock = true;
    ignoreStartUntilRelease = true;
    spawnCustomer();
  }

  function nearBike() {
    const p = state.player; let best = null, bestD = 999;
    for (const b of bikes) {
      if (b.taken) continue;
      const dx = (p.x + p.w/2) - (b.x + 12), dy = (p.y + p.h/2) - (b.y + 10), d = Math.sqrt(dx*dx + dy*dy);
      if (d < 19 && d < bestD) { best = b; bestD = d; }
    }
    return best;
  }
  function atCounter() {
    const p = state.player;
    // 入口エリア。上部UIを広げてプレイヤーの最小Yが58になったので、判定も入口の高さに合わせる。
    return p.x > 108 && p.x < 198 && p.y < 82;
  }

  function maybeGift(customer) {
    // たまにお客さんが差し入れをくれる。態度が良い客ほど少し出やすい。
    let chance = 0.28;
    if (customer.mood === 'good') chance += 0.14;
    if (customer.mood === 'bad') chance -= 0.08;
    if (customer.chatty) chance += 0.10;
    chance += state.ojisan.kindness * 0.008;
    if (Math.random() > chance) return null;

    let roll = Math.random();
    for (const g of GIFT_TYPES) {
      roll -= g.chance;
      if (roll <= 0) return g;
    }
    return GIFT_TYPES[0];
  }

  function maybeChattyBonus(customer) {
    if (!customer.chatty) return null;
    const roll = Math.random();
    if (roll < 0.10) return { id:'musouitem', name:'無双アイテム', color:'#ffe066' };
    if (roll < 0.28) return { id:'clock10', name:'時計+10秒', color:'#80e0ff' };
    return null;
  }

  function applyChattyBonus(item) {
    if (!item) return '';
    state.lastGift = item;
    state.giftTimer = 1.6;
    if (item.id === 'clock10') {
      state.time = clamp(state.time + 10, 0, 999);
      sound('musou');
      return '時計をくれた！ +10秒';
    }
    if (item.id === 'musouitem') {
      state.musou = 10;
      sound('musou');
      return '無双アイテムや！';
    }
    return '';
  }

  function applyGift(gift) {
    if (!gift) return '';
    state.stamina = clamp(state.stamina + gift.stamina, 0, 100);
    state.tension = clamp(state.tension + gift.tension, 0, 100);
    state.time = clamp(state.time + gift.time, 0, 999);

    if (gift.id === 'taiyaki') {
      sound('pickup');
      return '差し入れ:タイ焼き 体力+';
    }
    if (gift.id === 'heart') {
      sound('ok');
      return '差し入れ:ハート 回復+';
    }
    if (gift.id === 'clock') {
      sound('musou');
      return '差し入れ:時計 時間+' + gift.time;
    }
    if (gift.id === 'skull') {
      sound('miss');
      return '差し入れ:ドクロ…ダウン';
    }
    return '';
  }

  function action() {
    if (state.mode !== 'play') return;
    const p = state.player;
    if (p.hold) {
      if (atCounter() && state.customer) {
        if (p.hold.num === state.customer.want) {
          sound('ok');
          const o = state.ojisan, c = state.customer, techBonus = o.tech * 5, patienceBonus = Math.floor(c.patience * 10), musouBonus = state.musou > 0 ? 100 : 0;
          const add = c.bonus + patienceBonus + techBonus + musouBonus;
          state.score += add; state.served++;
          state.tension = clamp(state.tension + c.ten + Math.floor(o.kindness / 2), 0, 100);

          const gift = maybeGift(c);
          const giftMsg = applyGift(gift);
          state.lastGift = gift;
          state.giftTimer = gift ? 1.4 : 0;

          state.message = giftMsg || (c.text + ' +' + add);
          if (c.chatty) {
            state.talkTimer = 2 + Math.random() * 3;
            state.pendingChattyBonus = maybeChattyBonus(c);
            state.message = 'ぺちゃくちゃ話を聞いてる…';
          }
          if (state.tension >= 100) { state.musou = 10; state.tension = 35; state.message = '無双状態突入！'; sound('musou'); }
          state.messageTimer = c.chatty ? state.talkTimer : 1.2; state.customer = null; state.nextCustomerTimer = c.chatty ? state.talkTimer + .4 : .75;
        } else {
          sound('miss'); state.score = Math.max(0, state.score - 50); state.miss++; state.tension = clamp(state.tension - 10, 0, 100);
          state.message = '番号ちゃうで！ -50'; state.messageTimer = 1.0; p.hold.taken = false;
        }
        p.hold = null;
      } else {
        sound('drop'); p.hold.taken = false; p.hold = null; state.message = '自転車を戻した'; state.messageTimer = .7;
      }
    } else {
      const b = nearBike();
      if (b) {
        sound('pickup'); b.taken = true; p.hold = b;
        const cost = Math.max(1, b.type.stamina * 1.6 - state.ojisan.power);
        state.stamina = clamp(state.stamina - cost, 0, 100);
        state.message = b.num + '番 ' + b.type.short + 'を取った'; state.messageTimer = .7;
      }
    }
  }

  function togglePause() {
    if (state.mode === 'play') {
      state.mode = 'pause';
      state.message = 'ポーズ中';
      state.messageTimer = 0;
      sound('pause');
    } else if (state.mode === 'pause') {
      state.mode = 'play';
      state.message = '再開！';
      state.messageTimer = .7;
      state.lastTime = performance.now();
      sound('pause');
    }
  }

  function update(dt) {
    const rawStartPressed = keys.Enter || pad.start || touch.start;
    const rawPadTouchStart = pad.start || touch.start;
    if (ignoreStartUntilRelease && !rawStartPressed) ignoreStartUntilRelease = false;

    const startPressed = ignoreStartUntilRelease ? false : rawStartPressed;
    const pausePressed = ignoreStartUntilRelease ? false : (keys.p || keys.P || (rawPadTouchStart && (state.mode === 'play' || state.mode === 'pause')));
    const aPressed = keys.z || keys.Z || pad.a || touch.a;
    const leftPressed = keys.ArrowLeft || pad.left || touch.left;
    const rightPressed = keys.ArrowRight || pad.right || touch.right;

    if (state.mode === 'title') {
      if ((startPressed || aPressed) && !enterLock) {
        enterLock = true;
        state.mode = 'select';
        sound('start');
      }
      if (!startPressed && !aPressed) enterLock = false;
      if (!pausePressed) pauseLock = false;
      return;
    }

    if (state.mode === 'select') {
      const upPressed = keys.ArrowUp || pad.up || touch.up;
      const downPressed = keys.ArrowDown || pad.down || touch.down;
      if ((leftPressed || rightPressed || upPressed || downPressed) && !selectLock) {
        const cols = 4;
        const rows = Math.ceil(ojisans.length / cols);
        let col = selectedOjisan % cols;
        let row = Math.floor(selectedOjisan / cols);

        if (leftPressed) col = (col + cols - 1) % cols;
        else if (rightPressed) col = (col + 1) % cols;
        else if (upPressed) row = (row + rows - 1) % rows;
        else if (downPressed) row = (row + 1) % rows;

        let next = row * cols + col;
        while (next >= ojisans.length) {
          row = (row + rows - 1) % rows;
          next = row * cols + col;
        }
        selectedOjisan = next;
        state.ojisan = ojisans[selectedOjisan];
        sound('pickup');
        selectLock = true;
      }
      if (!leftPressed && !rightPressed && !upPressed && !downPressed) selectLock = false;
      if ((startPressed || aPressed) && !enterLock) { enterLock = true; restart(); }
      if (!startPressed && !aPressed) enterLock = false;
      if (!pausePressed) pauseLock = false;
      return;
    }

    if (state.mode === 'gameover') {
      if (startPressed && !enterLock) { enterLock = true; state = startState(); state.mode = 'title'; }
      if (!startPressed) enterLock = false;
      if (!pausePressed) pauseLock = false;
      return;
    }

    if (pausePressed && !pauseLock) {
      pauseLock = true;
      togglePause();
      return;
    }
    if (!pausePressed) pauseLock = false;

    if (state.mode === 'pause') return;
    if (state.mode !== 'play') return;

    state.time -= dt;
    if (state.time <= 0) {
      state.time = 0;
      if (!state.saved) { saveScore(state.score); state.highScore = loadHighScore(); state.saved = true; }
      state.mode = 'gameover'; sound('gameover'); state.message = 'おつかれさまでした'; return;
    }

    if (state.messageTimer > 0) state.messageTimer -= dt;
    if (state.giftTimer > 0) state.giftTimer -= dt;
    if (state.musou > 0) state.musou -= dt;
    if (state.talkTimer > 0) {
      state.talkTimer -= dt;
      if (state.talkTimer <= 0) {
        state.talkTimer = 0;
        const bonusMsg = applyChattyBonus(state.pendingChattyBonus);
        state.pendingChattyBonus = null;
        state.message = bonusMsg || '話、長かったな…';
        state.messageTimer = bonusMsg ? 1.4 : .8;
      }
      return;
    }

    const move = getMoveVector();
    const dashing = keys.x || keys.X || pad.b || touch.b;

    // ダッシュ中は自然回復させない。前は回復量がダッシュ消費を上回って見えにくかった。
    if (!state.player.hold && !(dashing && move.moving)) state.stamina = clamp(state.stamina + (7 + state.ojisan.power * .6) * dt, 0, 100);
    else if (state.player.hold && state.musou <= 0) {
      const t = state.player.hold.type;
      const drain = Math.max(.4, t.weight * .9 - state.ojisan.power * .35);
      state.stamina = clamp(state.stamina - drain * dt, 0, 100);
    }

    if (!state.customer) { state.nextCustomerTimer -= dt; if (state.nextCustomerTimer <= 0) spawnCustomer(); }
    else {
      state.customer.patience -= dt;
      if (state.customer.patience <= 0) {
        sound('miss'); state.score = Math.max(0, state.score - 80); state.miss++; state.tension = clamp(state.tension - 15, 0, 100);
        state.message = state.customer.name + 'が怒って帰った…'; state.messageTimer = 1.2; state.customer = null; state.nextCustomerTimer = 1.0;
      }
    }

    const p = state.player, o = state.ojisan;
    let vx = move.vx, vy = move.vy;
    let sp = 36 + o.speed * 4.2;
    if (dashing) {
      sp += 24;
      if (move.moving) {
        // 力が高いほどパワーダッシュで消費が重い。回復停止込みで目に見えて減る量に調整。
        const dashDrain = state.musou > 0 ? 0 : (18 + state.ojisan.power * 1.4);
        state.stamina = clamp(state.stamina - dashDrain * dt, 0, 100);
      }
    }
    if (p.hold && state.musou <= 0) sp *= (1 - p.hold.type.speedPenalty + o.power * .018);
    if (state.stamina < 25 && state.musou <= 0) sp *= .62;
    if (state.musou > 0) sp *= 1.55;

    if (vx || vy) {
      const len = Math.sqrt(vx*vx + vy*vy); vx /= len; vy /= len;
      p.x += vx * sp * dt; p.y += vy * sp * dt; if (vx !== 0) p.dir = vx > 0 ? 1 : -1;
    }
    p.x = clamp(p.x, 4, W - p.w - 4); p.y = clamp(p.y, 58, H - p.h - 6);

    if (aPressed && !zLock) { zLock = true; action(); }
    if (!aPressed) zLock = false;
  }

  function box(x,y,w,h,c) { ctx.fillStyle = c; ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h)); }
  function drawText(text,x,y,color='#fff',align='left') { ctx.fillStyle=color; ctx.font='10px monospace'; ctx.textAlign=align; ctx.fillText(text,x,y); }
  function bar(x,y,w,h,rate,c,bg='#303040') { box(x,y,w,h,bg); box(x,y,w*clamp(rate,0,1),h,c); }
  function statLine(label, val, x, y) { drawText(label, x, y, '#d8d8d8'); for(let i=0;i<10;i++) box(x+45+i*6,y-7,5,5,i<val?'#ffe066':'#404050'); }

  function drawBike(b, highlight=false) {
    const x=b.x,y=b.y,t=b.type;
    const c=highlight?'#ffffff':t.color;
    const dark='#101018';
    const tire='#080810';
    const rim='#303848';
    const spoke='#9098a8';
    const metal=highlight?'#ffe066':'#d8d8d8';
    const shadow='#000000';
    const brown='#a07040';
    const pink='#ffb0b0';

    const wheel = (wx, wy, big=false) => {
      const s = big ? 9 : 8;
      box(wx+1, wy+s, s-1, 2, shadow);
      box(wx+1, wy, s-2, 1, tire);
      box(wx, wy+1, s, s-2, tire);
      box(wx+1, wy+s-1, s-2, 1, tire);
      box(wx+2, wy+2, s-4, s-4, rim);
      box(wx+3, wy+3, s-6, s-6, '#202838');
      box(wx+Math.floor(s/2), wy+2, 1, s-4, spoke);
      box(wx+2, wy+Math.floor(s/2), s-4, 1, spoke);
    };
    const px = (a,b,w,h,col) => box(x+a,y+b,w,h,col);
    const frame = (pts, col=c) => pts.forEach(r => px(r[0], r[1], r[2], r[3], col));

    // 地面影
    px(0, 22, 26, 2, '#101820');

    if (t.name === 'ミニベロ') {
      wheel(x+1,y+12,false); wheel(x+16,y+12,false);
      frame([[5,11,15,3],[9,7,3,8],[6,8,8,3],[15,6,7,2],[3,9,6,2],[12,10,4,2]]);
      px(17,5,6,2,metal); px(4,7,6,2,metal); px(21,7,2,3,metal);
      px(8,5,5,2,'#f0f0f0');
    } else if (t.name === 'ロードバイク') {
      wheel(x,y+12,false); wheel(x+17,y+12,false);
      frame([[4,12,18,2],[8,7,10,2],[10,7,2,7],[6,10,5,2],[15,9,5,2],[12,8,5,5]]);
      px(20,5,6,2,metal); px(23,7,2,4,metal); px(24,10,3,1,metal);
      px(5,7,6,2,metal); px(8,5,5,2,'#f0f0f0');
      px(3,14,4,1,c); px(19,14,4,1,c);
    } else if (t.name === '一般') {
      wheel(x,y+12,false); wheel(x+16,y+12,false);
      frame([[3,11,19,3],[9,6,3,9],[6,9,9,3],[15,7,5,3],[12,10,4,3]]);
      px(19,7,6,6,brown); px(20,8,4,3,'#c09050');
      px(4,6,8,2,metal); px(19,5,6,2,metal); px(21,4,3,1,metal);
      px(7,4,6,2,'#f0f0f0'); px(2,11,3,2,'#ffd0a0');
    } else if (t.name === '電動') {
      wheel(x,y+11,true); wheel(x+16,y+11,true);
      frame([[3,10,20,4],[9,5,4,10],[6,8,11,3],[16,7,6,3],[12,10,4,4]]);
      px(7,12,9,5,'#404050'); px(8,13,7,3,'#707080'); px(9,14,2,1,'#ffe066');
      px(20,6,6,6,brown); px(21,7,4,3,'#c09050');
      px(4,5,8,2,metal); px(19,4,6,2,metal); px(7,3,6,2,'#f0f0f0');
      px(2,9,4,3,'#505060');
    } else {
      wheel(x,y+11,true); wheel(x+17,y+11,true);
      frame([[2,10,23,4],[9,4,4,11],[6,8,11,3],[16,7,7,3],[12,10,5,4]]);
      px(18,1,8,11,pink); px(19,2,6,6,'#ff8080'); px(20,8,4,3,'#904040');
      px(1,3,7,8,pink); px(2,4,5,5,'#ff8080'); px(2,10,5,2,'#904040');
      px(21,10,4,3,brown); px(4,5,8,2,metal); px(18,4,6,2,metal);
      px(8,2,7,2,'#f0f0f0'); px(24,6,3,3,'#ffd0a0');
    }

    for (let i=0; i<Math.ceil(t.weight/3); i++) box(x+i*4, y+25, 3, 2, c);
    drawText(String(b.num), x-1, y-2, highlight?'#ffe066':'#d8d8d8');
  }

  function drawOjisanSprite(x, y, o, scale=1, dir=1) {
    const s = scale;
    const px = (a,b,w,h,c) => box(x+a*s, y+b*s, w*s, h*s, c);
    const skin = '#ffd0a0', skin2 = '#e8a878', hair = '#303030', gray = '#d8d8d8';
    const pants = '#3030a0', pants2 = '#202070', shoe = '#101018', shirt = o.color;
    const shirtDark = '#404050';
    const hi = state.musou > 0 && Math.floor(performance.now()/80)%2===0;
    if (hi) px(-3,-3,18,27,'#ffe066');

    // 影
    px(1,23,13,2,'#080810');

    // 頭・髪・薄毛ライン
    px(4,0,7,2,hair);
    px(3,2,9,7,skin);
    px(3,3,1,4,hair);
    px(10,3,2,3,hair);
    px(5,1,5,1,gray);
    px(4,8,7,1,skin2);

    // 顔
    px(5,4,1,1,'#101018');
    px(9,4,1,1,'#101018');
    px(7,5,1,1,skin2);
    px(6,7,4,1,'#904040');
    if (o.kindness >= 8) px(6,6,4,1,'#ffe0c0');

    // 胴体・ベルト
    px(2,9,11,8,shirt);
    px(3,10,9,2,'#a0a0a0');
    px(2,16,11,2,shirtDark);
    px(6,16,2,2,'#ffe066');

    // 腕：力が高いと太い。方向で片腕を少し前に。
    const armW = o.power >= 8 ? 3 : 2;
    if (dir >= 0) {
      px(0,10,armW,8,skin); px(12,10,armW,7,skin);
      px(13,15,2,2,skin2);
    } else {
      px(0,10,armW,7,skin); px(12,10,armW,8,skin);
      px(0,15,2,2,skin2);
    }

    // 足
    px(3,18,4,6,pants); px(8,18,4,6,pants);
    px(3,21,4,3,pants2); px(8,21,4,3,pants2);
    px(2,24,5,2,shoe); px(8,24,6,2,shoe);

    // 能力の見た目差
    if (o.tech >= 8) { px(12,14,2,4,'#ffe066'); px(12,18,2,1,'#101018'); }
    if (o.speed >= 8) { px(1,25,5,1,'#80e0ff'); px(9,25,6,1,'#80e0ff'); }
    if (o.power >= 8) { px(0,12,2,5,skin2); px(13,12,2,5,skin2); }
  }

    const pants = c.name.includes('お姉さん') ? '#703080' : '#202030';
    const px = (a,b,w,h,col) => box(x+a,y+b,w,h,col);
    px(1,22,15,2,'#080810');
    px(5,0,7,2,hair); px(4,2,9,7,skin); px(3,3,2,5,hair); px(11,3,2,4,hair);
    px(6,4,1,1,'#101018'); px(10,4,1,1,'#101018');
    if (c.mood === 'bad') { px(6,6,5,1,'#101018'); px(5,3,2,1,'#101018'); px(10,3,2,1,'#101018'); }
    else { px(7,7,4,1,'#904040'); }
    px(3,9,11,9,body); px(4,10,9,2,'#f0f0f0');
    px(1,10,3,7,skin); px(13,10,3,7,skin);
    if (c.name.includes('会社員')) px(13,13,4,5,'#a07040');

  function drawPlayer() {

      const hx=x+(p.dir>0?12:-24), hy=y+5, c=p.hold.type.color;

    box(142,48,166,178,'#303040');
    drawText('選択中',225,62,'#d8d8d8','center');
    drawText('[' + o.id + '] ' + o.name,225,80,'#ffffff','center');
    drawOjisanSprite(214, 94, o, 2, 1);

    statLine('力', o.power, 160, 156);
    statLine('速さ', o.speed, 160, 174);
    statLine('技術', o.tech, 160, 192);
    statLine('優しさ', o.kindness, 160, 210);
  }

  function drawGameOver() {
    drawWorld(); box(48,58,224,128,'#101018'); box(52,62,216,120,'#303040');
    drawText('GAME OVER',160,82,'#ff7070','center'); drawText('SCORE ' + state.score,160,106,'#ffe066','center');
    drawText(state.ojisan.name,160,124,'#fff','center'); drawText('出した台数 ' + state.served + '台 / ミス ' + state.miss,160,142,'#fff','center');
    drawText('HIGH SCORE ' + state.highScore,160,160,'#ffe066','center');
    const recent = loadLastScores(); if (recent[0]) drawText('前回 ' + recent[0].score,160,174,'#d8d8d8','center');
    drawText('STARTで選択へ',160,202,'#60e060','center');
  }

  function drawPause() {
    drawWorld(); box(78,78,164,70,'#101018'); box(82,82,156,62,'#303040');
    drawText('PAUSE',160,105,'#ffe066','center'); drawText('P / START で再開',160,128,'#60e060','center');
  }

  function runSelfTests() {
    console.assert(clamp(5, 0, 10) === 5, 'clamp keeps middle values');
    console.assert(clamp(-1, 0, 10) === 0, 'clamp clamps low values');
    console.assert(clamp(99, 0, 10) === 10, 'clamp clamps high values');
    const oldKeys = { ...keys };
    keys.ArrowLeft = true; keys.ArrowUp = true;
    const mv = getMoveVector();
    console.assert(mv.vx === -1 && mv.vy === -1 && mv.moving === true, 'getMoveVector detects diagonal movement');
    Object.keys(keys).forEach(k => delete keys[k]);
    Object.assign(keys, oldKeys);
    const prevMode = state.mode;
    state.mode = 'title';
    console.assert(state.mode === 'title', 'initial flow starts at title mode');
    state.mode = 'play'; togglePause(); console.assert(state.mode === 'pause', 'togglePause pauses play mode');
    togglePause(); console.assert(state.mode === 'play', 'togglePause resumes pause mode');
    state.mode = prevMode;
    const oldPlayer = state.player;
    state.player = { x:156, y:70, w:14, h:20, hold:null, dir:1 };
    console.assert(atCounter() === true, 'atCounter allows handing over at the entrance');
    state.player = oldPlayer;
    const staminaBefore = 100;
    const sampleOjisan = { power: 9 };
    const dashDrainSample = 18 + sampleOjisan.power * 1.4;
    console.assert(dashDrainSample > 18, 'strong ojisan has heavier dash drain');
    console.assert(staminaBefore - dashDrainSample * 0.1 < staminaBefore, 'dash drain decreases stamina');
    const oldStamina = state.stamina;
    const oldTension = state.tension;
    const oldTime = state.time;
    applyGift({ id:'taiyaki', name:'タイ焼き', stamina:10, tension:0, time:0 });
    console.assert(state.stamina >= oldStamina, 'taiyaki recovers stamina');
    state.stamina = oldStamina; state.tension = oldTension; state.time = oldTime;
    applyGift({ id:'skull', name:'ドクロ', stamina:-10, tension:-10, time:0 });
    console.assert(state.stamina <= oldStamina && state.tension <= oldTension, 'skull decreases stamina and tension');
    state.stamina = oldStamina; state.tension = oldTension; state.time = oldTime;
    const bonus = maybeChattyBonus({ chatty:true });
    console.assert(bonus === null || ['clock10','musouitem'].includes(bonus.id), 'chatty bonus returns only allowed items');
    const oldPending = state.pendingChattyBonus;
    state.pendingChattyBonus = { id:'clock10', name:'時計+10秒', color:'#80e0ff' };
    const oldTimeForChatBonus = state.time;
    applyChattyBonus(state.pendingChattyBonus);
    console.assert(state.time === oldTimeForChatBonus + 10, 'chatty clock bonus is applied after talk');
    state.pendingChattyBonus = oldPending;
    const oldSelected = selectedOjisan;
    selectedOjisan = 0;
    state.mode = 'select';
    keys.ArrowDown = true;
    update(0.016);
    console.assert(selectedOjisan === 4, 'select down moves one row in the 4-column grid');
    keys.ArrowDown = false;
    selectLock = false;
    keys.ArrowRight = true;
    update(0.016);
    console.assert(selectedOjisan === 5, 'select right moves one column in the grid');
    keys.ArrowRight = false;
    selectedOjisan = oldSelected;
    state.mode = prevMode;
    console.assert(typeof musicTick === 'function', 'musicTick is defined');
    console.assert(typeof update === 'function' && typeof action === 'function', 'core functions are defined');
  }

  function loop(t) {
    pollGamepad(); const dt = Math.min(.05, (t - state.lastTime) / 1000); state.lastTime = t;
    musicTick(dt);
    update(dt);
    if (state.mode === 'title') drawTitle(); else if (state.mode === 'select') drawSelect(); else if (state.mode === 'gameover') drawGameOver(); else if (state.mode === 'pause') drawPause(); else drawWorld();
    requestAnimationFrame(loop);
  }

  window.addEventListener('keydown', e => { initAudio(); keys[e.key] = true; if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Enter'].includes(e.key)) e.preventDefault(); });
  window.addEventListener('keyup', e => keys[e.key] = false);
  window.addEventListener('gamepadconnected', () => initAudio());
  window.addEventListener('pointerdown', () => initAudio());
  setupTouchControls();
  runSelfTests();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
